<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers"
	xmlns:core="http://typo3.org/ns/TYPO3/CMS/Core/ViewHelpers"
	xmlns:ftdb="http://typo3.org/ns/Lavitto/FormToDatabase/ViewHelpers" data-namespace-typo3-fluid="true">

<f:layout name="Default"/>

<f:section name="MainContent">
	<h1>
		{formResult.crdate -> f:format.date(format: '{dateFormat} {timeFormat}')}
	</h1>

	<div class="t3js-modal-body modal-body">
		<div class="hide-print pull-right form-group">
			<a href="#" class="btn btn-default hide-print"
				title="{f:translate(key: 'LLL:EXT:core/Resources/Private/Language/locallang_common.xlf:print')}"
				onclick="printDiv('printableArea')">
				<core:icon identifier="actions-print" />
				{f:translate(key: 'LLL:EXT:core/Resources/Private/Language/locallang_common.xlf:print')}
			</a>
		</div>
		<div class="table-fit-wrap" id="printableArea">
			<table class="table table-striped table-hover">
				<f:for each="{formRenderables}" as="renderable">
					<tr>
						<th class="col-word-break">
							{renderable.label}
						</th>
						<td>
							<f:format.raw>
								<ftdb:formValue value="{renderable.identifier}" results="{formResult.resultAsArray}"
									element="{renderable}" crop="false" />
							</f:format.raw>
						</td>
					</tr>
				</f:for>
			</table>
		</div>
	</div>
</f:section>
</html>
